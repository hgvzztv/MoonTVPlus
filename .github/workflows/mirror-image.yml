name: Mirror Docker image to GHCR
on:
  workflow_dispatch: {}
permissions:
  contents: read
  packages: write
jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Copy image with crane
        run: |
          crane copy ghcr.io/mtvpls/moontvplus:latest ghcr.io/${{ github.actor }}/hf-mtv-dma:latest

      - name: Show result
        run: |
          echo "✅ Pushed: ghcr.io/${{ github.actor }}/hf-mtv-dma:latest"
          echo "🔑 源镜像摘要:"
          crane digest ghcr.io/mtvpls/moontvplus:latest
          echo "🔑 你的镜像摘要:"
          crane digest ghcr.io/${{ github.actor }}/hf-mtv-dma:latest
